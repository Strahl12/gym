<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{ user }} — Gym Coach</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif;
         display: flex; flex-direction: column; height: 100dvh;
         background: Canvas; color: CanvasText; }
  header { padding: .75rem 1rem; font-weight: 600;
           border-bottom: 1px solid color-mix(in srgb, CanvasText 15%, transparent); }
  #msgs { flex: 1; overflow-y: auto; padding: 1rem;
          display: flex; flex-direction: column; gap: .5rem; }
  .msg { max-width: 85%; padding: .55rem .8rem; border-radius: 1rem;
         white-space: pre-wrap; overflow-wrap: break-word; line-height: 1.35; }
  .user { align-self: flex-end; background: #2563eb; color: #fff;
          border-bottom-right-radius: .3rem; }
  .assistant { align-self: flex-start;
               background: color-mix(in srgb, CanvasText 8%, Canvas);
               border-bottom-left-radius: .3rem; }
  #err { color: #dc2626; font-size: .8rem; padding: 0 1rem .5rem; display: none; }
  form { display: flex; gap: .5rem; padding: .75rem;
         padding-bottom: calc(.75rem + env(safe-area-inset-bottom));
         border-top: 1px solid color-mix(in srgb, CanvasText 15%, transparent); }
  textarea { flex: 1; resize: none; border-radius: 1rem; padding: .55rem .8rem;
             font: inherit; background: transparent; color: inherit;
             border: 1px solid color-mix(in srgb, CanvasText 25%, transparent); }
  button { border: 0; border-radius: 1rem; padding: 0 1.1rem; font: inherit;
           font-weight: 600; background: #2563eb; color: #fff; }
  button:disabled { opacity: .5; }
</style>
</head>
<body>
<header>Gym Coach — {{ user }}</header>
<div id="msgs"></div>
<div id="err"></div>
<form id="f">
  <textarea id="box" rows="1" placeholder="Ask your coach…" autocomplete="off"></textarea>
  <button id="send" type="submit">Send</button>
</form>
<script>
const base = location.pathname.replace(/\/$/, "");
const msgs = document.getElementById("msgs");
const box  = document.getElementById("box");
const send = document.getElementById("send");
const err  = document.getElementById("err");

function add(role, text) {
  const d = document.createElement("div");
  d.className = "msg " + role;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

async function loadHistory() {
  try {
    const r = await fetch(base + "/history");
    for (const m of await r.json()) add(m.role, m.content);
  } catch (ex) {
    err.textContent = "could not load history";
    err.style.display = "block";
  }
}

async function submit(e) {
  e.preventDefault();
  const text = box.value.trim();
  if (!text || send.disabled) return;
  err.style.display = "none";
  add("user", text);
  box.value = "";
  send.disabled = true;
  const thinking = add("assistant", "…");
  try {
    const r = await fetch(base + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.statusText);
    thinking.textContent = data.reply;
  } catch (ex) {
    thinking.remove();
    err.textContent = ex.message;
    err.style.display = "block";
  } finally {
    send.disabled = false;
    msgs.scrollTop = msgs.scrollHeight;
    box.focus();
  }
}

document.getElementById("f").addEventListener("submit", submit);
box.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(e); }
});
loadHistory();
</script>
</body>
</html>
